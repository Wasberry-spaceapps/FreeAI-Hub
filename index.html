<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FreeAI Hub | Completely Free & Local AI Tools</title>
    <meta name="description" content="The definitive directory of completely free, open-source, and local AI tools. No paywalls, no limits.">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { primary: '#4f46e5', dark: '#0f172a' }
                }
            }
        }
    </script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* Custom scrollbar for wiki feel */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hidden-mobile { display: none; }
        @media (min-width: 768px) { .hidden-mobile { display: block; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 font-sans antialiased flex h-screen overflow-hidden">

    <!-- Mobile Header -->
    <div class="md:hidden fixed top-0 w-full bg-white border-b border-slate-200 z-50 flex justify-between items-center p-4">
        <h1 class="text-xl font-bold tracking-tight text-primary">FreeAI Hub</h1>
        <button id="mobile-menu-btn" class="p-2 text-slate-600"><i data-lucide="menu"></i></button>
    </div>

    <!-- Sidebar Navigation -->
    <aside id="sidebar" class="bg-white border-r border-slate-200 w-64 h-full flex-shrink-0 flex flex-col fixed md:relative z-40 transform -translate-x-full md:translate-x-0 transition-transform duration-200 ease-in-out mt-16 md:mt-0">
        <div class="p-6 hidden md:block">
            <h1 class="text-2xl font-bold tracking-tight text-primary flex items-center gap-2">
                <i data-lucide="box"></i> FreeAI Hub
            </h1>
            <p class="text-xs text-slate-500 mt-2">100% Free. No Paywalls.</p>
        </div>

        <div class="px-4 pb-4 border-b border-slate-100 hidden md:block">
            <div class="relative">
                <i data-lucide="search" class="absolute left-3 top-2.5 h-4 w-4 text-slate-400"></i>
                <input type="text" id="search-input" placeholder="Search tools..." class="w-full bg-slate-100 border-none rounded-md py-2 pl-9 pr-3 text-sm focus:ring-2 focus:ring-primary outline-none">
            </div>
        </div>

        <nav class="flex-1 overflow-y-auto p-4 space-y-6">
            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 px-2">Pages</h2>
                <ul class="space-y-1">
                    <li><a href="#" onclick="navigate('home')" id="nav-home" class="nav-link flex items-center gap-2 px-2 py-1.5 text-sm rounded-md hover:bg-slate-100 text-slate-700 bg-slate-100 font-medium"><i data-lucide="home" class="w-4 h-4"></i> Home</a></li>
                    <li><a href="#" onclick="navigate('all')" id="nav-all" class="nav-link flex items-center gap-2 px-2 py-1.5 text-sm rounded-md hover:bg-slate-100 text-slate-700"><i data-lucide="list" class="w-4 h-4"></i> All Tools</a></li>
                    <li><a href="#" onclick="navigate('about')" id="nav-about" class="nav-link flex items-center gap-2 px-2 py-1.5 text-sm rounded-md hover:bg-slate-100 text-slate-700"><i data-lucide="info" class="w-4 h-4"></i> About</a></li>
                </ul>
            </div>
            
            <div>
                <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3 px-2">Categories</h2>
                <ul id="category-list" class="space-y-1">
                    <!-- Categories injected by JS -->
                </ul>
            </div>
        </nav>
    </aside>

    <!-- Main Content Area -->
    <main class="flex-1 h-full overflow-y-auto bg-slate-50 p-6 md:p-10 pt-20 md:pt-10 scroll-smooth">
        <div id="content-area" class="max-w-5xl mx-auto">
            <!-- Content injected by JS -->
        </div>
    </main>

    <!-- Overlay for mobile sidebar -->
    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/50 z-30 hidden md:hidden"></div>

    <script src="app.js"></script>
</body>
</html>
